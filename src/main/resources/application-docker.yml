spring:
  sql:
    init:
      mode: never
      schema-locations: classpath:schema.sql
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://127.0.0.1:3306/ggbot?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:ggbot}
    password: ${SPRING_DATASOURCE_PASSWORD:ggbot123}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:127.0.0.1}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:123456}
      timeout: 3s
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
