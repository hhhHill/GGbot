spring:
  application:
    name: GGbot

server:
  port: 8080

app:
  feishu:
    enabled: false
    mock-send: true
    app-id: ${FEISHU_APP_ID:}
    app-secret: ${FEISHU_APP_SECRET:}
    base-url: https://open.feishu.cn
    token-path: /open-apis/auth/v3/tenant_access_token/internal
    message-path: /open-apis/im/v1/messages
  llm:
    enabled: false
    base-url: ${LLM_BASE_URL:https://api.openai.com/v1}
    api-key: ${LLM_API_KEY:}
    model: ${LLM_MODEL:gpt-4o-mini}
