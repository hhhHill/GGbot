spring:
  application:
    name: GGbot
  profiles:
    default: docker
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
  sql:
    init:
      mode: embedded
      schema-locations: classpath:schema.sql
  autoconfigure:
    exclude:
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioSpeechAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioTranscriptionAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiEmbeddingAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiImageAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiModerationAutoConfiguration
  ai:
    model:
      chat: ${SPRING_AI_MODEL_CHAT:openai}
    openai:
      base-url: ${SPRING_AI_OPENAI_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode}
      api-key: ${SPRING_AI_OPENAI_API_KEY}
      chat:
        options:
          model: ${SPRING_AI_OPENAI_MODEL}

server:
  port: 8080

agent:
  runner:
    max-iterations: 10

app:
  feishu:
    enabled: true
    mock-send: false
    app-id: ${FEISHU_APP_ID:}
    app-secret: ${FEISHU_APP_SECRET:}
    base-url: https://open.feishu.cn
    token-path: /open-apis/auth/v3/tenant_access_token/internal
    message-path: /open-apis/im/v1/messages

asr:
  enabled: ${ASR_ENABLED:false}
  provider: ${ASR_PROVIDER:openai-compatible}
  base-url: ${ASR_BASE_URL:}
  api-key: ${ASR_API_KEY:}
  model: ${ASR_MODEL:whisper-1}
  timeout: ${ASR_TIMEOUT:20s}
  max-file-size: ${ASR_MAX_FILE_SIZE:5MB}
  allowed-content-types:
    - audio/webm
    - audio/mp4
    - audio/mpeg
    - audio/wav
